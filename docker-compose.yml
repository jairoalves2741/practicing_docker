services:
  db:
    image: mariadb:10.11
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: aluno123

  phpmyadmin:
    image: phpmyadmin
    restart: always
    ports:
      - 8080:80
    environment:
      PMA_HOST: db

  php:
    image: php:8.2-fpm
    volumes:
      - ./meufrontend:/var/www/html

  web:
    image: nginx
    ports:
      - "80:80"
    volumes:
      - ./meufrontend:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
